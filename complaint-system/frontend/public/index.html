<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Local Complaint Management System" />
    <title>CivicAlert – Local Complaint Management</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * { font-family: 'DM Sans', sans-serif; }
      h1, h2, h3, h4, h5, .font-display { font-family: 'Syne', sans-serif; }

      /* Smooth page transitions */
      .page-enter { animation: fadeSlideUp 0.35s ease forwards; }
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Status badge colors */
      .badge-pending     { background:#FEF3C7; color:#92400E; }
      .badge-inprogress  { background:#DBEAFE; color:#1E40AF; }
      .badge-resolved    { background:#D1FAE5; color:#065F46; }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 antialiased">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
